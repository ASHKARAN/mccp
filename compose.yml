version: '3.8'
services:

  # =====================
  # Vector DB for AI
  # =====================
  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: always
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ~/docker/data/qdrant:/qdrant/storage
    networks:
      - mccp_network

  # =====================
  # Embedding + LLM API (Local Model)
  # =====================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ~/docker/data/ollama:/root/.ollama
      - ~/docker/data/ollama/data:/data/docs:ro
    networks:
      - mccp_network
    environment:
      - OLLAMA_NUM_PARALLEL=2      # allow multiple concurrent threads
      - OLLAMA_KV_CACHE_TYPE=paged # faster attention caching
      - OLLAMA_KEEP_ALIVE=2h
      - OLLAMA_FLASH_ATTENTION=true


  openwebui:
    image: openeuler/open-webui:latest
    container_name: openwebui
    restart: always
    ports:
      - "3000:8080"
    environment:
      # Point the UI to your local Ollama API
      - OLLAMA_API_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=some-strong-random-key-here
      - USER_AGENT=OpenWebUI-Local
      - LOG_LEVEL=DEBUG

    depends_on:
      - ollama
    networks:
      - mccp_network

volumes:
  ollama_data:
  qdrant_logs:


networks:
  mccp_network:
    external: true
